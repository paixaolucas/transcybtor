name: Build Mac

on:
  push:
    branches: [master]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Download yt-dlp (macOS universal)
        run: |
          mkdir -p bin
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o bin/yt-dlp
          chmod +x bin/yt-dlp

      - name: Install ffmpeg and copy to bin/
        run: |
          brew install ffmpeg
          cp "$(which ffmpeg)" bin/ffmpeg

      - name: Build DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish never

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Transcybtor-mac
          path: installer/*.dmg
          retention-days: 90
